name: Build Blackwing Launcher

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/launcher/package.json

      - name: Install dependencies
        working-directory: apps/launcher
        run: npm install

      - name: Build Windows installer
        working-directory: apps/launcher
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: BlackwingLauncher-Windows-Installer
          path: apps/launcher/dist/*.exe
          if-no-files-found: warn

      - name: Upload portable .exe
        uses: actions/upload-artifact@v4
        with:
          name: BlackwingLauncher-Windows-Portable
          path: apps/launcher/dist/*portable*.exe
          if-no-files-found: warn

  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/launcher
        run: npm install

      - name: Build macOS
        working-directory: apps/launcher
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: BlackwingLauncher-macOS
          path: apps/launcher/dist/*.dmg
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: BlackwingLauncher-Windows-Installer
          path: release/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: BlackwingLauncher-macOS
          path: release/
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
